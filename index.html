  else if (DRAG.type === "waste") move({ type: "w2t", to: col });
  else if (DRAG.type === "foundation") move({ type: "f2t", suit: DRAG.suit, to: col });
}
function handleDropToFound(suit) {
  if (!DRAG) return;
  if (DRAG.type === "tab") {
    // 런이 아닌 단일 카드(맨 위)만 파운데이션 가능
    const p = S.game.tab[DRAG.col];
    if (DRAG.idx === p.length - 1) move({ type: "t2f", col: DRAG.col, suit });
  } else if (DRAG.type === "waste") {
    move({ type: "w2f", suit });
  }
}

/* ===========================================================
   (D-2) 터치 드래그 — 모바일/태블릿 대응
   HTML5 드래그앤드롭은 터치 화면에서 동작하지 않으므로
   touch 이벤트로 직접 끌어다 놓기를 구현한다. (PC 마우스는 기존 DnD 사용)
   - 손가락을 조금 움직이면 카드(묶음)가 손가락을 따라오고,
     떼는 위치의 열/파운데이션에 놓는다.
   - 움직임 없이 두 번 두드리면(더블탭) 파운데이션으로 자동 이동.
=========================================================== */
let TOUCH = null;
let touchHover = null;
let lastTap = { key: "", t: 0 };

function touchSrcFromEl(el) {
  if (!el) return null;
  if (el.dataset.area === "tab") return { type: "tab", col: +el.dataset.col, idx: +el.dataset.idx };
  if (el.dataset.area === "waste") return { type: "waste" };
  if (el.dataset.area === "found") return { type: "foundation", suit: +el.dataset.suit };
  return null;
}

// 끌리는 카드 DOM 목록 (타블로는 idx부터 끝까지 묶음, 그 외엔 카드 한 장)
function touchOriginEls(src, startEl) {
  if (src.type === "tab") {
    const p = S.game.tab[src.col];
    const els = [];
    for (let i = src.idx; i < p.length; i++) {
      const e = $(`card-${src.col}-${i}`);
      if (e) els.push(e);
    }
    return els.length ? els : [startEl];
  }
  return [startEl];
}

function buildTouchGhost(els) {
  const ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  const r0 = els[0].getBoundingClientRect();
  ghost.style.width = r0.width + "px";
  els.forEach((el) => {
    const r = el.getBoundingClientRect();
    const clone = el.cloneNode(true);
    clone.classList.remove("dragging", "hint", "hint-target");
    clone.style.position = "absolute";
    clone.style.left = "0px";
    clone.style.top = (r.top - r0.top) + "px";
    clone.style.width = r.width + "px";
    clone.style.height = r.height + "px";
    ghost.appendChild(clone);
  });
  document.body.appendChild(ghost);
  return ghost;
}

function zoneAtPoint(x, y) {
  if (TOUCH && TOUCH.ghost) TOUCH.ghost.style.visibility = "hidden";
  const el = document.elementFromPoint(x, y);
  if (TOUCH && TOUCH.ghost) TOUCH.ghost.style.visibility = "";
  if (!el || !el.closest) return null;
  return el.closest(".col") || el.closest(".found");
}

function clearTouchHover() {
  if (touchHover) { touchHover.classList.remove("drop-hover"); touchHover = null; }
}

function cleanupTouchDrag(cur) {
  if (cur.ghost && cur.ghost.parentNode) cur.ghost.parentNode.removeChild(cur.ghost);
  if (cur.originEls) cur.originEls.forEach((el) => el && el.classList.remove("dragging"));
  clearTouchHover();
}

function onTouchStart(e) {
  if (e.touches.length !== 1) { TOUCH = null; return; }
  const cardEl = e.target.closest && e.target.closest(".card");
  const src = cardEl ? touchSrcFromEl(cardEl) : null;
  if (!src) { TOUCH = null; return; }
  const t = e.touches[0];
  const r = cardEl.getBoundingClientRect();
  TOUCH = {
    src,
    startEl: cardEl,
    startX: t.clientX,
    startY: t.clientY,
    grabX: t.clientX - r.left,
    grabY: t.clientY - r.top,
    moved: false,
    ghost: null,
    originEls: null,
  };
}

function onTouchMove(e) {
  if (!TOUCH) return;
  const t = e.touches[0];
  if (!t) return;
  if (!TOUCH.moved) {
    if (Math.hypot(t.clientX - TOUCH.startX, t.clientY - TOUCH.startY) < 8) return;
    TOUCH.moved = true;
    TOUCH.originEls = touchOriginEls(TOUCH.src, TOUCH.startEl);
    TOUCH.ghost = buildTouchGhost(TOUCH.originEls);
    TOUCH.originEls.forEach((el) => el.classList.add("dragging"));
    clearHints();
  }
  e.preventDefault();
  TOUCH.ghost.style.left = (t.clientX - TOUCH.grabX) + "px";
  TOUCH.ghost.style.top = (t.clientY - TOUCH.grabY) + "px";
  const zone = zoneAtPoint(t.clientX, t.clientY);
  if (zone !== touchHover) {
    clearTouchHover();
    if (zone) { zone.classList.add("drop-hover"); touchHover = zone; }
  }
}

function onTouchEnd(e) {
  if (!TOUCH) return;
  const cur = TOUCH;
  TOUCH = null;
  e.preventDefault();   // 카드 탭 시 합성 클릭/더블클릭 중복 실행 방지
  if (!cur.moved) {
    handleCardTap(cur.src);
    return;
  }
  const t = (e.changedTouches && e.changedTouches[0]) || null;
  const zone = t ? zoneAtPoint(t.clientX, t.clientY) : null;
  cleanupTouchDrag(cur);
  if (zone) {
    DRAG = cur.src;
    if (zone.classList.contains("found")) handleDropToFound(+zone.dataset.suit);
    else handleDropToCol(+zone.dataset.col);
    DRAG = null;
  }
}

function onTouchCancel() {
  if (!TOUCH) return;
  const cur = TOUCH;
  TOUCH = null;
  cleanupTouchDrag(cur);
}

// 더블탭(같은 카드를 빠르게 두 번) → 파운데이션으로 자동 이동
function handleCardTap(src) {
  const key =
    src.type === "tab" ? `t${src.col}.${src.idx}` :
    src.type === "waste" ? "w" : `f${src.suit}`;
  const now = Date.now();
  const isDouble = key === lastTap.key && (now - lastTap.t) < 320;
  lastTap = { key, t: now };
  if (!isDouble) return;
  lastTap = { key: "", t: 0 };
  if (src.type === "tab") {
    if (src.idx === S.game.tab[src.col].length - 1) autoToFoundationFromTab(src.col);
  } else if (src.type === "waste") {
    autoToFoundationFromWaste();
  }
}

/* ===========================================================
   힌트
=========================================================== */
function clearHints() {
  S.hintEls.forEach((el) => el && el.classList.remove("hint", "hint-target"));
  S.hintEls = [];
}
function mark(id, cls) {
  const el = $(id);
  if (el) {
    el.classList.add(cls);
    S.hintEls.push(el);
  }
}
function resetHintTimer() {
  // 힌트는 제한 없이 항상 사용 가능 (승리 시에만 비활성화)
  clearTimeout(S.hintTimer);
  if (isWin()) hideHintBtn();
  else showHintBtn();
}
function showHintBtn() {
  $("hintBtn").disabled = false;
}
function hideHintBtn() {
  $("hintBtn").disabled = true;
}

function cardLabel(c) {
  return SUIT_SYM[c.s] + RANK_SYM[c.r];
}
function tabDestLabel(toCol) {
  const dp = S.game.tab[toCol];
  if (!dp.length) return "빈 칸";
  return cardLabel(dp[dp.length - 1]) + " 위";
}

// 추상 수 m 의 출발 카드/목적지를 강조하고 텍스트로 안내한다.
// (m.src 가 'sw' 인 경우, 이 시점엔 해당 카드가 웨이스트 맨 위에 있다고 가정)
function highlightMove(m) {
  if (m.k === "D") {
    const f = S.game.found[m.suit];
    const c = f.length ? f[f.length - 1] : { s: m.suit, r: m.suit };
    mark(`found-${m.suit}`, "hint");
    mark(`col-${m.to}`, "hint-target");
    toast(`${cardLabel(c)} → ${tabDestLabel(m.to)} (되내리기)`);
    return;
  }
  if (m.k === "F") {
    if (m.src === "t") {
      const p = S.game.tab[m.col];
      const c = p[p.length - 1];
      mark(`card-${m.col}-${p.length - 1}`, "hint");
      mark(`found-${c.s}`, "hint-target");
      toast(`${cardLabel(c)} → 파운데이션`);
    } else {
      mark("waste-top", "hint");
      mark(`found-${m.card.s}`, "hint-target");
      toast(`${cardLabel(m.card)} → 파운데이션`);
    }
  } else {
    if (m.src === "t") {
      const p = S.game.tab[m.col];
      for (let i = m.idx; i < p.length; i++) mark(`card-${m.col}-${i}`, "hint");
      mark(`col-${m.to}`, "hint-target");
      toast(`${cardLabel(p[m.idx])} → ${tabDestLabel(m.to)}`);
    } else {
      mark("waste-top", "hint");
      mark(`col-${m.to}`, "hint-target");
      toast(`${cardLabel(m.card)} → ${tabDestLabel(m.to)}`);
    }
  }
}

// 보이는 카드에 대한 수 m: 강조 + 해설 패널 표시 (실행은 사용자 몫 또는 '다음' 버튼)
function presentHint(m) {
  clearHints();
  highlightMove(m);
  const info = explainMove(m, false);
  hintSay("이번 추천 수", info.title, info.why, info.principle);
  $("tutNextBtn").style.display = "";
  showHintPanel(true);
}

// '다음' 버튼: 지금 추천한 수를 대신 두고 → 곧바로 다음 수를 보여준다.
// 끝까지 누르면 클리어(자동 완성/승리 처리)로 이어진다.
function hintNext() {
  if (S.autoPlaying || S.hinting) return; // 자동 진행/스톡 자동 넘김 중엔 무시
  const plan = hintMoves();
  if (!plan || !plan.length) {
    showHint(); // 플랜이 없으면 먼저 계산해 보여줌
    return;
  }
  performAbstractMove(plan[0]); // 추천 수 실행 (+ afterMove 에서 plan 갱신)
  // 클리어면 onWin/자동완성이 처리(클리어 화면). 아니면 다음 수 표시.
  if (!isWin() && !S.autoPlaying) showHint();
}

function showHint() {
  if (S.hinting || S.autoPlaying) return;
  clearHints();
  // 힌트 전용 최단 진전 경로를 계산(없으면 솔버 플랜 폴백)한 뒤 보여준다.
  // 워커에서 돌아 화면은 안 멈춘다(최대 5초).
  ensureHintPlan().then(() => {
    if (!S.hinting && !S.autoPlaying) showHintWithPlan();
  });
}

function showHintWithPlan() {
  if (S.hinting || S.autoPlaying) return;
  clearHints();
  const plan = hintMoves();
  if (!plan || !plan.length) {
    $("tutNextBtn").style.display = "none";
    showHintPanel(true);
    hintSay(
      "추천할 수가 없어요",
      isWin() ? "🎉 이미 클리어한 판이에요!" : "여기서는 더 풀 수 없어요.",
      isWin() ? "‘NEW’로 새 판을 시작해 보세요." : "‘UNDO’나 ‘RESET’으로 돌아가면 다시 길이 열려요.",
      ""
    );
    return;
  }
  const m = plan[0];
  const wasteTop = S.game.waste.length ? S.game.waste[S.game.waste.length - 1] : null;
  const same = (c, card) => c && card && c.s === card.s && c.r === card.r;

  // 보이는 카드(되내리기/타블로/웨이스트 맨 위)면 바로 강조 + 해설
  if (m.k === "D" || m.src === "t" || same(wasteTop, m.card)) {
    presentHint(m);
    return;
  }

  // 스톡에 묻힌 카드 → 웨이스트로 나올 때까지 자동으로 한 장씩 넘긴 뒤 강조
  S.hinting = true;
  setInputLock(true);
  const di = explainMove(m, true);
  hintSay("이번 추천 수", di.title, di.why, di.principle);
  showHintPanel(true);
  mark("stock", "hint");
  let safety = (S.game.stock.length + S.game.waste.length) * 2 + 4;
  function step() {
    const wt = S.game.waste.length ? S.game.waste[S.game.waste.length - 1] : null;
    if (same(wt, m.card)) {
      S.hinting = false;
      setInputLock(false);
      presentHint(m);
      return;
    }
    if (safety-- <= 0) {
      S.hinting = false;
      setInputLock(false);
      clearHints();
      mark("stock", "hint");
      hintSay(
        "이번 추천 수",
        `스톡에서 ${cardLabel(m.card)} 찾기`,
        `스톡을 넘겨 ${cardLabel(m.card)} 를 직접 꺼내 보세요.`,
        "필요한 카드는 스톡을 넘겨 찾아온다."
      );
      return;
    }
    drawStock();
    setTimeout(step, 150);
  }
  step();
}

/* ===========================================================
   토스트
=========================================================== */
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ===========================================================
   새 게임
=========================================================== */
function newGame() {
  const overlay = $("overlay");
  $("win").classList.add("hidden");
  clearTimeout(S.hintTimer);
  hideHintBtn();
  S.autoPlaying = false;
  S.hinting = false;
  showHintPanel(false);
  setInputLock(false);
  stopCascade();

  const apply = (g) => {
    S.game = g;
    S.initialState = structuredClone(g);
    S.moves = 0;
    S.plan = null;
    S.planAbs = null;
    S.history = [];
    clearHints();
    render();
    updateUndoBtn();
    updateSolvability();
    overlay.classList.add("hidden");
    resetHintTimer();
    saveGame();        // 새 판도 즉시 저장 → 껐다 켜면 이 판이 이어짐
    ensureDealQueue(); // 다음 '새 판'을 백그라운드에서 미리 준비
  };

  if (dealQueue.length) {
    // 미리 만들어 둔 판이 있으면 즉시 시작 (대기/멈춤 없음)
    apply(dealQueue.shift());
  } else {
    // 준비된 판이 아직 없을 때만 잠깐 안내를 띄우고 백그라운드 생성을 기다린다
    overlay.classList.remove("hidden");
    DEALER.dealAsync().then((g) => apply(g || dealWinnable()));
  }
}

/* ===========================================================
   초기화 / 정적 이벤트 (이벤트 위임 등록은 여기서 1회만)
=========================================================== */
function setupStatic() {
  $("newBtn").addEventListener("click", newGame);
  $("winNewBtn").addEventListener("click", newGame);
  $("hintBtn").addEventListener("click", showHint);
  $("undoBtn").addEventListener("click", undo);
  $("restartBtn").addEventListener("click", restart);
  $("tutNextBtn").addEventListener("click", hintNext);
  $("tutEndBtn").addEventListener("click", closeHintPanel);
  $("saveBtn").addEventListener("click", () => openDealModal("save"));
  $("loadBtn").addEventListener("click", () => openDealModal("load"));
  $("saveCurBtn").addEventListener("click", () => openDealModal("savecur"));
  $("autoBtn").addEventListener("click", () => {
    if (S.autoPlaying) cancelAuto();
    else startAuto();
  });
  // 모바일 대응: 자동 진행 중 화면(잠금막) 아무 곳이나 탭하면 중지
  $("lock").addEventListener("click", () => {
    if (S.autoPlaying) cancelAuto();
  });
  // ESC: AUTO 진행 중이면 중지, 아니면 열린 패널/모달 닫기
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (S.autoPlaying) { cancelAuto(); return; }
    if (!$("dealModal").classList.contains("hidden")) { closeDealModal(); return; }
    if (!$("tutorial").classList.contains("hidden")) { closeHintPanel(); return; }
  });
  $("dealCopyBtn").addEventListener("click", copyDealCode);
  $("dealLoadBtn").addEventListener("click", loadDealFromModal);
  $("dealCloseBtn").addEventListener("click", closeDealModal);
  $("stock").addEventListener("click", () => drawStock());

  // 드롭 존(정적 컨테이너 — 1회만 등록)
  document.querySelectorAll(".col").forEach((col) => {
    col.addEventListener("dragover", (e) => e.preventDefault());
    col.addEventListener("drop", (e) => {
      e.preventDefault();
      handleDropToCol(parseInt(col.dataset.col));
    });
  });
  document.querySelectorAll(".found").forEach((f) => {
    f.addEventListener("dragover", (e) => e.preventDefault());
    f.addEventListener("drop", (e) => {
      e.preventDefault();
      handleDropToFound(parseInt(f.dataset.suit));
    });
  });

  // 카드 드래그/더블클릭 — 컨테이너 위임
  const tableau = $("tableau");
  tableau.addEventListener("dragstart", (e) => {
    const el = e.target.closest && e.target.closest(".card");
    if (!el || el.dataset.area !== "tab") return;
    onDragStart(e, { type: "tab", col: +el.dataset.col, idx: +el.dataset.idx });
  });
  tableau.addEventListener("dragend", onDragEnd);
  tableau.addEventListener("dblclick", (e) => {
    const el = e.target.closest && e.target.closest(".card");
    if (!el || el.dataset.area !== "tab") return;
    const col = +el.dataset.col;
    if (+el.dataset.idx === S.game.tab[col].length - 1) autoToFoundationFromTab(col);
  });

  const top = $("top");
  top.addEventListener("dragstart", (e) => {
    const el = e.target.closest && e.target.closest(".card");
    if (!el) return;
    if (el.dataset.area === "waste") onDragStart(e, { type: "waste" });
    else if (el.dataset.area === "found") onDragStart(e, { type: "foundation", suit: +el.dataset.suit });
  });
  top.addEventListener("dragend", onDragEnd);
  top.addEventListener("dblclick", (e) => {
    const el = e.target.closest && e.target.closest(".card");
    if (!el || el.dataset.area !== "waste") return;
    autoToFoundationFromWaste();
  });

  // 모바일/태블릿: 터치 드래그 (위임). touchmove/touchend 는 스크롤 차단 위해 non-passive.
  [tableau, top].forEach((zone) => {
    zone.addEventListener("touchstart", onTouchStart, { passive: true });
    zone.addEventListener("touchmove", onTouchMove, { passive: false });
    zone.addEventListener("touchend", onTouchEnd, { passive: false });
    zone.addEventListener("touchcancel", onTouchCancel, { passive: false });
  });
}

SOLVER.init();   // 판정 전담 워커 준비
DEALER.init();   // 딜 생성 전담 워커 준비
setupStatic();
// 저장된 진행 상황이 있으면 이어서, 없으면 새 판으로 시작
if (restoreSavedGame()) {
  ensureDealQueue(); // 다음 '새 판'을 미리 준비해 둠
} else {
  newGame();
}
</script>
